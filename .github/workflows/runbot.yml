name: Octopus Coffee Bot

on:
  schedule:
    - cron: "58 4 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - run: pip install requests

      - run: python bot.py
        env:
          OCTO_EMAIL_1: ${{ secrets.OCTO_EMAIL_1 }}
          OCTO_PASS_1: ${{ secrets.OCTO_PASS_1 }}
          OCTO_ACC_1: ${{ secrets.OCTO_ACC_1 }}
          OCTO_EMAIL_2: ${{ secrets.OCTO_EMAIL_2 }}
          OCTO_PASS_2: ${{ secrets.OCTO_PASS_2 }}
          OCTO_ACC_2: ${{ secrets.OCTO_ACC_2 }}
