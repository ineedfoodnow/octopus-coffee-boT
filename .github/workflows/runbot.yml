name: Octopus Coffee Bot

on:
  # Primary trigger: cron-job.org calls workflow_dispatch at 4:55am Europe/London Mon–Thu
  # That handles BST/GMT automatically — this is just here to receive it
  workflow_dispatch:

  schedule:
    # -----------------------------------------------------------------------
    # FALLBACK CRONS — only used if cron-job.org fails to fire
    # GitHub Actions cron is UTC-only with no timezone support, so two entries
    # are needed to cover both UK clock seasons:
    #
    #   GMT season (last Sun Oct → last Sun Mar): 5am UK = 05:00 UTC
    #   BST season (last Sun Mar → last Sun Oct): 5am UK = 04:00 UTC
    #
    # The bot's own time-guard detects which cron fired at the wrong time
    # and exits in seconds, costing < 1 runner minute.
    # -----------------------------------------------------------------------
    - cron: "55 4 * * 1-4"  # GMT season: 4:55am UTC = 4:55am UK (Mon–Thu)
    - cron: "55 3 * * 1-4"  # BST season: 3:55am UTC = 4:55am UK (Mon–Thu)

jobs:
  run:
    runs-on: ubuntu-latest

    # 25 min covers: startup (~2 min) + pre-5am sleep (up to 10 min) +
    # Monday 20-min poll window. Fallback days exit well within this.
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run coffee bot
        run: python bot.py
        env:
          OCTO_APIKEY_1: ${{ secrets.OCTO_APIKEY_1 }}
          OCTO_ACC_1: ${{ secrets.OCTO_ACC_1 }}
          OCTO_APIKEY_2: ${{ secrets.OCTO_APIKEY_2 }}
          OCTO_ACC_2: ${{ secrets.OCTO_ACC_2 }}
          OCTO_APIKEY_3: ${{ secrets.OCTO_APIKEY_3 }}
          OCTO_ACC_3: ${{ secrets.OCTO_ACC_3 }}
