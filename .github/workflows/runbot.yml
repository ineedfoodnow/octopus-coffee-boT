name: Octopus Coffee Bot

on:
  schedule:
  - cron: "0 3 * * *"
  - cron: "15 3 * * *"
  - cron: "30 3 * * *"
  - cron: "45 3 * * *"
  - cron: "0 4 * * *"
  - cron: "15 4 * * *"
  - cron: "30 4 * * *"
  - cron: "45 4 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run coffee bot
        run: python bot.py
        env:
          OCTO_APIKEY_1: ${{ secrets.OCTO_APIKEY_1 }}
          OCTO_ACC_1: ${{ secrets.OCTO_ACC_1 }}
          OCTO_APIKEY_2: ${{ secrets.OCTO_APIKEY_2 }}
          OCTO_ACC_2: ${{ secrets.OCTO_ACC_2 }}
