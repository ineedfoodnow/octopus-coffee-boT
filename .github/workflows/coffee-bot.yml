name: Octopus Coffee Bot

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Bypass time guard for manual testing"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx

      - name: Run coffee bot
        run: python bot.py
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          OCTO_APIKEY_1: ${{ secrets.OCTO_APIKEY_1 }}
          OCTO_ACC_1: ${{ secrets.OCTO_ACC_1 }}
          OCTO_APIKEY_2: ${{ secrets.OCTO_APIKEY_2 }}
          OCTO_ACC_2: ${{ secrets.OCTO_ACC_2 }}
          OCTO_APIKEY_3: ${{ secrets.OCTO_APIKEY_3 }}
          OCTO_ACC_3: ${{ secrets.OCTO_ACC_3 }}
