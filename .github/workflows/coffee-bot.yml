name: Octopus Coffee Bot

# Triggered exclusively by cron-job.org at 4:55am Europe/London daily.
# cron-job.org POST settings:
#   URL:     https://api.github.com/repos/YOUR_USERNAME/YOUR_REPO/actions/workflows/coffee-bot.yml/dispatches
#   Method:  POST
#   Headers: Authorization: Bearer YOUR_PAT
#            Accept: application/vnd.github+json
#            X-GitHub-Api-Version: 2022-11-28
#   Body:    {"ref": "main"}
#   Time:    04:55 Europe/London — daily

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Bypass time guard (manual catch-up)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run coffee bot
        run: python bot.py
        env:
          FORCE_RUN: ${{ github.event.inputs.force_run || 'false' }}
          OCTO_APIKEY_1: ${{ secrets.OCTO_APIKEY_1 }}
          OCTO_ACC_1: ${{ secrets.OCTO_ACC_1 }}
          OCTO_APIKEY_2: ${{ secrets.OCTO_APIKEY_2 }}
          OCTO_ACC_2: ${{ secrets.OCTO_ACC_2 }}
          OCTO_APIKEY_3: ${{ secrets.OCTO_APIKEY_3 }}
          OCTO_ACC_3: ${{ secrets.OCTO_ACC_3 }}
